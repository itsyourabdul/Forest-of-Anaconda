<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D HORROR SNAKE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff0000;
            text-shadow: 0 0 12px #ff0000, 0 0 24px #800000;
            font-size: 28px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 18px;
            letter-spacing: 2px;
        }
        #ui span {
            font-weight: bold;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 80px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #800000;
            display: none;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            line-height: 1.1;
        }
        #pause {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-size: 68px;
            text-shadow: 0 0 20px #ffcc00, 0 0 40px #aa8800;
            display: none;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            line-height: 1.1;
        }
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 300;
            transition: opacity 80ms ease-out;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #660000;
            font-size: 14px;
            text-shadow: 0 0 8px #ff0000;
            z-index: 100;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span>
        LENGTH: <span id="length">6</span>
        <span style="font-size:22px; opacity:0.8;">|</span>
        HIGH SCORE: <span id="highScore">0</span>
    </div>
    <div id="gameOver">
        YOU DIED<br>
        <span id="finalScoreDisplay" style="font-size: 34px; display: block; margin: 12px 0 8px;">FINAL SCORE: 0</span>
        <span style="font-size: 24px;">PRESS R TO RESTART</span>
    </div>
    <div id="pause">
        PAUSED<br>
        <span style="font-size: 24px;">PRESS P TO RESUME</span>
    </div>
    <div id="flash"></div>
    <div id="instructions">
        ARROW KEYS or WASD • EAT THE EYES • SURVIVE THE FOREST • P: PAUSE
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============================================
        // 3D HORROR SNAKE - ULTRA SMOOTH Forest Edition
        // • Fewer trees (less visual obstruction)
        // • New snake-like serpent stones
        // • Progressive speed increase
        // • Pause system + improved UI/UX
        // • Rounder snake body + better interpolation
        // • Smoother lighting & camera shake
        // =============================================

        let scene, camera, renderer;
        let snakeMeshes = [];
        let snakeGridPositions = [];
        let previousSnakeGrid = [];
        let foodMesh = null;
        let foodGrid = null;
        let direction = new THREE.Vector3(1, 0, 0);
        let pendingDirection = null;
        let gameOver = false;
        let paused = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('horrorSnakeHighScore') || '0');
        let lastMoveTime = 0;
        let clock;
        let MOVE_INTERVAL = 200; // starting speed (easy & smooth)

        // Horror elements
        let dirLight, ambientLight, hemiLight, redLight;
        let eyeMeshes = [];

        // Shake
        let shakeIntensity = 0;
        let shakeDecay = 0;

        const CONFIG = {
            SNAKE_COLOR: 0x0f4a0f,
            HEAD_COLOR: 0x22aa22,
            BODY_EMISSIVE: 0x002200,
            FLOOR_COLOR: 0x221133,
            FOG_COLOR: 0x223355,
            EYE_GLOW: 0x00ff88,
            GRID_SIZE: 22,
            CELL_SIZE: 2.2,
            INITIAL_LENGTH: 6
        };

        // Helper: convert grid coords to world position
        function gridToWorld(gridPos) {
            return new THREE.Vector3(
                (gridPos.x - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE,
                0.5,
                (gridPos.z - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE
            );
        }

        // Create a single snake segment - ULTRA SMOOTH & ROUND
        function createSegmentMesh(isHead = false) {
            let mesh;
            
            if (isHead) {
                const geometry = new THREE.BoxGeometry(
                    CONFIG.CELL_SIZE * 0.88, 
                    CONFIG.CELL_SIZE * 0.92, 
                    CONFIG.CELL_SIZE * 1.35
                );
                
                const material = new THREE.MeshStandardMaterial({
                    color: CONFIG.HEAD_COLOR,
                    emissive: CONFIG.BODY_EMISSIVE,
                    emissiveIntensity: 1.0,
                    roughness: 0.4,
                    metalness: 0.35
                });
                
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Red glowing eyes
                const eyeGeo = new THREE.SphereGeometry(0.27, 12, 12);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(0.38, 0.38, 0.48);
                mesh.add(leftEye);
                
                const rightEye = leftEye.clone();
                rightEye.position.set(-0.38, 0.38, 0.48);
                mesh.add(rightEye);
            } else {
                // Ultra-smooth cylindrical body (more segments = rounder)
                const geometry = new THREE.CylinderGeometry(
                    CONFIG.CELL_SIZE * 0.38,
                    CONFIG.CELL_SIZE * 0.42,
                    CONFIG.CELL_SIZE * 0.92,
                    24
                );
                
                const material = new THREE.MeshStandardMaterial({
                    color: CONFIG.SNAKE_COLOR,
                    emissive: CONFIG.BODY_EMISSIVE,
                    emissiveIntensity: 0.55,
                    roughness: 0.4,
                    metalness: 0.15
                });
                
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.rotation.x = Math.PI / 2;
            }
            
            return mesh;
        }

        // Create glowing background eye
        function createEye() {
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 8, 8),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    transparent: true,
                    opacity: 0.95
                })
            );
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.28, 0.35, 8),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.5
                })
            );
            ring.rotation.x = Math.PI / 2;
            eye.add(ring);
            return eye;
        }

        // Realistic forest tree (kept but reduced count)
        function createTree() {
            const group = new THREE.Group();
            
            const trunkGeometry = new THREE.CylinderGeometry(0.35, 0.55, 5.2, 6);
            const trunkMaterial = new THREE.MeshStandardMaterial({
                color: 0x3c2a1f,
                roughness: 1,
                metalness: 0.05
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 2.6;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            const foliageMaterial = new THREE.MeshStandardMaterial({
                color: 0x0d2e0d,
                roughness: 0.9,
                metalness: 0
            });
            
            const foliageData = [
                { radius: 2.9, height: 3.6, y: 5.1 },
                { radius: 2.2, height: 3.2, y: 7.4 },
                { radius: 1.4, height: 2.8, y: 9.3 }
            ];
            
            foliageData.forEach(data => {
                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(data.radius, data.height, 8),
                    foliageMaterial
                );
                cone.position.y = data.y;
                cone.castShadow = true;
                group.add(cone);
            });
            
            return group;
        }

        // NEW: Snake-like serpent stone (twisted horror pillar)
        function createSerpentStone() {
            const group = new THREE.Group();
            
            // Heavy base stone
            const baseGeo = new THREE.CylinderGeometry(1.1, 1.45, 1.9, 8);
            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x444444,
                roughness: 1,
                metalness: 0.1
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.95;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            // Twisted snake body (9 segments with organic twist)
            const stoneMat = new THREE.MeshStandardMaterial({
                color: 0x2f2f2f,
                roughness: 0.95,
                metalness: 0.05
            });
            
            for (let i = 0; i < 9; i++) {
                const radius = 0.58 - (i * 0.035);
                const seg = new THREE.Mesh(
                    new THREE.CylinderGeometry(radius, radius + 0.04, 1.08, 9),
                    stoneMat
                );
                seg.position.y = 2.0 + i * 0.96;
                
                // Organic snake-like twist
                const twist = Math.sin(i * 1.15) * 0.72;
                seg.rotation.z = twist;
                seg.rotation.x = Math.cos(i * 0.85) * 0.38;
                
                seg.castShadow = true;
                seg.receiveShadow = true;
                group.add(seg);
            }
            
            // Serpent "head" at top
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.68, 8, 8),
                stoneMat
            );
            head.position.y = 2.0 + 9 * 0.96 + 0.3;
            head.castShadow = true;
            group.add(head);
            
            // Tiny glowing eye on the head (extra creepy)
            const eyeGeo = new THREE.SphereGeometry(0.16, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: CONFIG.EYE_GLOW });
            const stoneEye = new THREE.Mesh(eyeGeo, eyeMat);
            stoneEye.position.set(0.32, head.position.y + 0.18, 0.25);
            group.add(stoneEye);
            
            return group;
        }

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(CONFIG.FOG_COLOR, 18, 110);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();
            
            // Lighting (brighter + smoother flicker)
            ambientLight = new THREE.AmbientLight(0x335577, 0.68);
            scene.add(ambientLight);
            
            hemiLight = new THREE.HemisphereLight(0x445577, CONFIG.FLOOR_COLOR, 0.58);
            scene.add(hemiLight);
            
            dirLight = new THREE.DirectionalLight(0xffeecc, 1.3);
            dirLight.position.set(25, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -42;
            dirLight.shadow.camera.right = 42;
            dirLight.shadow.camera.top = 42;
            dirLight.shadow.camera.bottom = -42;
            scene.add(dirLight);
            
            redLight = new THREE.PointLight(0xff2233, 0.9, 80);
            redLight.position.set(15, 12, -15);
            scene.add(redLight);
            
            // Large forest floor
            const floorGeo = new THREE.PlaneGeometry(
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 72,
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 72
            );
            const floorMat = new THREE.MeshStandardMaterial({
                color: CONFIG.FLOOR_COLOR,
                roughness: 0.88,
                metalness: 0.12
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);
            
            const arenaHalf = (CONFIG.GRID_SIZE * CONFIG.CELL_SIZE) / 2;
            
            // Background glowing eyes
            eyeMeshes = [];
            const eyeCountPerWall = 6;
            // Left / Right / Back eyes
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(-arenaHalf - 2, 3 + Math.random() * 4, -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1))));
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(arenaHalf + 2, 3 + Math.random() * 4, -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1))));
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(-arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1))), 3 + Math.random() * 4, -arenaHalf - 2);
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            
            // === FOREST TREES (reduced from 28 to 20 = fewer obstructions) ===
            const numTrees = 20;
            const treeSpread = CONFIG.GRID_SIZE * CONFIG.CELL_SIZE * 1.9;
            for (let i = 0; i < numTrees; i++) {
                const tree = createTree();
                const x = (Math.random() - 0.5) * treeSpread;
                const z = (Math.random() - 0.5) * treeSpread;
                tree.position.set(x, 0, z);
                tree.rotation.y = Math.random() * Math.PI * 2;
                scene.add(tree);
            }
            
            // === NEW: SNAKE-LIKE SERPENT STONES ===
            const numSerpentStones = 8;
            for (let i = 0; i < numSerpentStones; i++) {
                const stone = createSerpentStone();
                const x = (Math.random() - 0.5) * treeSpread * 0.82;
                const z = (Math.random() - 0.5) * treeSpread * 0.82;
                stone.position.set(x, 0, z);
                stone.rotation.y = Math.random() * Math.PI * 2;
                scene.add(stone);
            }
            
            // Fullscreen resize
            const handleResize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
            window.addEventListener('resize', handleResize);
            
            console.log('%c3D HORROR SNAKE - ULTRA SMOOTH Edition Ready', 'color:#00ff88; font-family:monospace');
        }

        // Initialize snake
        function initSnake() {
            snakeMeshes.forEach(m => scene.remove(m));
            snakeMeshes = [];
            snakeGridPositions = [];
            
            const startX = Math.floor(CONFIG.GRID_SIZE / 2);
            const startZ = Math.floor(CONFIG.GRID_SIZE / 2);
            
            for (let i = 0; i < CONFIG.INITIAL_LENGTH; i++) {
                const gridPos = new THREE.Vector3(startX - i, 0, startZ);
                snakeGridPositions.push(gridPos);
                
                const isHead = (i === 0);
                const segment = createSegmentMesh(isHead);
                segment.position.copy(gridToWorld(gridPos));
                scene.add(segment);
                snakeMeshes.push(segment);
            }
            
            previousSnakeGrid = snakeGridPositions.map(pos => pos.clone());
            direction = new THREE.Vector3(1, 0, 0);
            pendingDirection = null;
            
            // Update length UI
            document.getElementById('length').textContent = snakeGridPositions.length;
        }

        // Spawn food
        function spawnFood() {
            if (foodMesh) scene.remove(foodMesh);
            
            let pos;
            let attempts = 0;
            do {
                pos = new THREE.Vector3(
                    Math.floor(Math.random() * CONFIG.GRID_SIZE),
                    0,
                    Math.floor(Math.random() * CONFIG.GRID_SIZE)
                );
                attempts++;
            } while (
                attempts < 100 &&
                snakeGridPositions.some(s => s.x === pos.x && s.z === pos.z)
            );
            
            foodGrid = pos;
            
            foodMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(CONFIG.CELL_SIZE * 0.45, 1),
                new THREE.MeshStandardMaterial({
                    color: 0xff1122,
                    emissive: 0xff0000,
                    emissiveIntensity: 1.6,
                    roughness: 0.2
                })
            );
            foodMesh.position.copy(gridToWorld(foodGrid));
            foodMesh.castShadow = true;
            scene.add(foodMesh);
        }

        // Core move logic
        function moveSnake() {
            if (gameOver || paused) return;
            
            if (pendingDirection) {
                if (!pendingDirection.clone().multiplyScalar(-1).equals(direction)) {
                    direction.copy(pendingDirection);
                }
                pendingDirection = null;
            }
            
            const oldGrid = snakeGridPositions.map(pos => pos.clone());
            
            const head = snakeGridPositions[0];
            const newHead = head.clone().add(direction);
            
            const outOfBounds = 
                newHead.x < 0 || newHead.x >= CONFIG.GRID_SIZE ||
                newHead.z < 0 || newHead.z >= CONFIG.GRID_SIZE;
            
            const selfCollision = snakeGridPositions.some(pos => 
                pos.x === newHead.x && pos.z === newHead.z
            );
            
            if (outOfBounds || selfCollision) {
                triggerGameOver();
                return;
            }
            
            snakeGridPositions.unshift(newHead);
            
            const ate = foodGrid && newHead.x === foodGrid.x && newHead.z === foodGrid.z;
            
            if (ate) {
                score++;
                document.getElementById('score').textContent = score;
                triggerJumpScare();
                spawnFood();
                
                // PROGRESSIVE SPEED (every 5 eyes = faster & harder)
                if (score % 5 === 0) {
                    MOVE_INTERVAL = Math.max(82, MOVE_INTERVAL - 16);
                }
                
                // Update length UI
                document.getElementById('length').textContent = snakeGridPositions.length;
            } else {
                snakeGridPositions.pop();
            }
            
            // Add missing meshes (growth)
            while (snakeMeshes.length < snakeGridPositions.length) {
                const tailGrid = snakeGridPositions[snakeGridPositions.length - 1];
                const newSegment = createSegmentMesh(false);
                newSegment.position.copy(gridToWorld(tailGrid));
                scene.add(newSegment);
                snakeMeshes.push(newSegment);
            }
            
            previousSnakeGrid = oldGrid;
            if (snakeGridPositions.length > previousSnakeGrid.length) {
                previousSnakeGrid.push(previousSnakeGrid[previousSnakeGrid.length - 1].clone());
            }
        }

        // Jump-scare
        function triggerJumpScare() {
            const flashEl = document.getElementById('flash');
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '0.78';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 110ms ease-out';
                flashEl.style.opacity = '0';
            }, 8);
            
            shakeIntensity = 2.0;
            shakeDecay = 0.11;
            
            dirLight.intensity = 3.0;
            setTimeout(() => { if (!gameOver && !paused) dirLight.intensity = 1.3; }, 75);
            
            if (snakeMeshes[0]) {
                snakeMeshes[0].scale.set(1.42, 1.42, 1.42);
                setTimeout(() => {
                    if (snakeMeshes[0]) snakeMeshes[0].scale.set(1, 1, 1);
                }, 110);
            }
        }

        // Game over
        function triggerGameOver() {
            gameOver = true;
            const go = document.getElementById('gameOver');
            go.style.display = 'block';
            document.getElementById('finalScoreDisplay').textContent = `FINAL SCORE: ${score}`;
            
            scene.fog.color.setHex(0x330000);
            camera.position.y += 8;
            camera.lookAt(0, -5, 0);
            
            snakeMeshes.forEach((mesh) => {
                if (mesh.material) {
                    mesh.material.emissive = new THREE.Color(0xff0000);
                    mesh.material.emissiveIntensity = 2.8;
                }
            });
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('horrorSnakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        // Keyboard controls (ultra responsive)
        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (gameOver) {
                    if (e.key.toLowerCase() === 'r') {
                        resetGame();
                        e.preventDefault();
                    }
                    return;
                }
                
                // Pause
                if (e.key.toLowerCase() === 'p') {
                    paused = !paused;
                    document.getElementById('pause').style.display = paused ? 'block' : 'none';
                    e.preventDefault();
                    return;
                }
                
                let newDir = null;
                
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        newDir = new THREE.Vector3(-1, 0, 0);
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        newDir = new THREE.Vector3(1, 0, 0);
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        newDir = new THREE.Vector3(0, 0, -1);
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        newDir = new THREE.Vector3(0, 0, 1);
                        break;
                }
                
                if (newDir) {
                    pendingDirection = newDir;
                    e.preventDefault();
                }
            });
        }

        // Reset game
        function resetGame() {
            gameOver = false;
            paused = false;
            score = 0;
            MOVE_INTERVAL = 200;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('length').textContent = CONFIG.INITIAL_LENGTH;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('pause').style.display = 'none';
            scene.fog.color.setHex(CONFIG.FOG_COLOR);
            
            initSnake();
            spawnFood();
            lastMoveTime = Date.now();
            
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
        }

        // Main animation loop (ultra smooth interpolation)
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const currentTime = Date.now();
            
            // Movement (respects pause)
            if (!gameOver && !paused && currentTime - lastMoveTime > MOVE_INTERVAL) {
                moveSnake();
                lastMoveTime = currentTime;
            }
            
            const progress = Math.min((currentTime - lastMoveTime) / MOVE_INTERVAL, 1);
            
            // Update snake positions with ultra-smooth lerp
            for (let i = 0; i < snakeMeshes.length; i++) {
                if (!previousSnakeGrid[i] || !snakeGridPositions[i]) continue;
                
                const from = gridToWorld(previousSnakeGrid[i]);
                const to = gridToWorld(snakeGridPositions[i]);
                
                const lerpedPos = from.clone().lerp(to, progress);
                snakeMeshes[i].position.copy(lerpedPos);
                
                if (i === 0 && snakeMeshes[0]) {
                    snakeMeshes[0].rotation.y = Math.atan2(direction.x, direction.z);
                } else if (i > 0 && snakeGridPositions[i-1] && snakeGridPositions[i]) {
                    const dir = snakeGridPositions[i-1].clone().sub(snakeGridPositions[i]).normalize();
                    const angle = Math.atan2(dir.x, dir.z);
                    snakeMeshes[i].rotation.y = angle;
                }
            }
            
            if (foodMesh) {
                foodMesh.rotation.y = time * 2.8;
                const pulse = 1 + Math.sin(time * 9) * 0.18;
                foodMesh.scale.setScalar(pulse);
            }
            
            // Smooth flickering light
            dirLight.intensity = 1.3 + Math.sin(time * 14) * 0.25;
            
            // Pulse background eyes
            eyeMeshes.forEach((eye, i) => {
                const scale = 1 + Math.sin(time * 6.5 + i) * 0.16;
                eye.scale.setScalar(scale);
            });
            
            // Camera shake (smoother decay)
            if (shakeIntensity > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity * 1.1;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.65;
                camera.position.z += (Math.random() - 0.5) * shakeIntensity * 0.45;
                shakeIntensity *= (1 - shakeDecay);
                if (shakeIntensity < 0.04) shakeIntensity = 0;
            }
            
            renderer.render(scene, camera);
        }

        // Start the game
        function startGame() {
            initScene();
            initSnake();
            spawnFood();
            setupControls();
            lastMoveTime = Date.now();
            
            document.getElementById('highScore').textContent = highScore;
            
            animate();
            
            console.log('%c✅ 3D HORROR SNAKE - ULTRA SMOOTH + New serpent stones + Pause + Progressive speed', 'color:#00ff88; background:#110022; padding:2px 8px');
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
