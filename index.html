<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D HORROR SNAKE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 80px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #800000;
            display: none;
            text-align: center;
            z-index: 200;
            pointer-events: none;
        }
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 300;
            transition: opacity 80ms ease-out;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #660000;
            font-size: 14px;
            text-shadow: 0 0 5px #ff0000;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="gameOver">
        YOU DIED<br>
        <span style="font-size: 24px;">PRESS R TO RESTART</span>
    </div>
    <div id="flash"></div>
    <div id="instructions">
        ARROW KEYS or WASD • EAT THE EYES • SURVIVE THE DARK
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============================================
        // 3D HORROR SNAKE - Modular & Expandable
        // Three.js + Horror Effects (dark fog, flickering, eyes, jump-scares)
        // =============================================

        let scene, camera, renderer;
        let snakeMeshes = [];
        let snakeGridPositions = [];
        let previousSnakeGrid = [];
        let foodMesh = null;
        let foodGrid = null;
        let direction = new THREE.Vector3(1, 0, 0);
        let pendingDirection = null;
        let gameOver = false;
        let score = 0;
        let lastMoveTime = 0;
        let clock;
        let MOVE_INTERVAL = 160; // ms - lower = faster snake (smooth movement via lerp)
        let GRID_SIZE = 22;
        let CELL_SIZE = 2.2;
        let arenaHalf;
        let headMeshIndex = 0; // index 0 is always head (different material)

        // Horror elements
        let dirLight, ambientLight;
        let eyeMeshes = [];
        let shakeIntensity = 0;
        let shakeDecay = 0;

        // Modular constants for easy expansion
        const CONFIG = {
            SNAKE_COLOR: 0x113311,
            HEAD_COLOR: 0x22aa22,
            BODY_EMISSIVE: 0x001100,
            WALL_COLOR: 0x331111,
            FLOOR_COLOR: 0x110011,
            FOG_COLOR: 0x110022,
            EYE_GLOW: 0x00ff88,
            GRID_SIZE: 22,
            CELL_SIZE: 2.2,
            MOVE_SPEED: 160,
            INITIAL_LENGTH: 6
        };

        // Helper: convert grid coords to world position (centered arena)
        function gridToWorld(gridPos) {
            return new THREE.Vector3(
                (gridPos.x - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE,
                0.5, // floating above floor
                (gridPos.z - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE
            );
        }

        // Create a single snake segment (modular - easy to swap geometry later)
        function createSegmentMesh(isHead = false) {
            const geometry = isHead 
                ? new THREE.BoxGeometry(CONFIG.CELL_SIZE * 0.95, CONFIG.CELL_SIZE * 0.95, CONFIG.CELL_SIZE * 0.95)
                : new THREE.BoxGeometry(CONFIG.CELL_SIZE * 0.85, CONFIG.CELL_SIZE * 0.85, CONFIG.CELL_SIZE * 0.85);
            
            const material = new THREE.MeshStandardMaterial({
                color: isHead ? CONFIG.HEAD_COLOR : CONFIG.SNAKE_COLOR,
                emissive: CONFIG.BODY_EMISSIVE,
                emissiveIntensity: isHead ? 0.6 : 0.2,
                roughness: 0.7,
                metalness: 0.3
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Horror detail: tiny glowing "veins" on head
            if (isHead) {
                const eyeGeo = new THREE.SphereGeometry(0.25, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(0.4, 0.4, 0.4);
                mesh.add(leftEye);
                const rightEye = leftEye.clone();
                rightEye.position.z = -0.4;
                mesh.add(rightEye);
            }
            return mesh;
        }

        // Create glowing background eye (creepy watcher effect)
        function createEye() {
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 6, 6),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    transparent: true,
                    opacity: 0.9
                })
            );
            // Add subtle glow ring
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.28, 0.35, 8),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.4
                })
            );
            ring.rotation.x = Math.PI / 2;
            eye.add(ring);
            return eye;
        }

        // Initialize Three.js scene with horror atmosphere
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(CONFIG.FOG_COLOR, 25, 80); // thick mist
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();
            
            // Horror lighting
            ambientLight = new THREE.AmbientLight(0x112233, 0.15);
            scene.add(ambientLight);
            
            dirLight = new THREE.DirectionalLight(0xeedd99, 0.45);
            dirLight.position.set(25, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);
            
            // Extra eerie red point light (flickers subtly)
            const redLight = new THREE.PointLight(0xff1122, 0.6, 80);
            redLight.position.set(15, 12, -15);
            scene.add(redLight);
            
            // Floor - blood-stained concrete look
            const floorGeo = new THREE.PlaneGeometry(
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 12,
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 12
            );
            const floorMat = new THREE.MeshStandardMaterial({
                color: CONFIG.FLOOR_COLOR,
                roughness: 0.95,
                metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Arena walls (cracked, blood-stained)
            arenaHalf = (CONFIG.GRID_SIZE * CONFIG.CELL_SIZE) / 2;
            const wallMat = new THREE.MeshStandardMaterial({
                color: CONFIG.WALL_COLOR,
                roughness: 1,
                metalness: 0
            });
            const wallHeight = 8;
            const wallThickness = 1.2;
            
            // Left & Right
            const sideGeo = new THREE.BoxGeometry(wallThickness, wallHeight, CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 4);
            const leftWall = new THREE.Mesh(sideGeo, wallMat);
            leftWall.position.set(-arenaHalf - wallThickness / 2, wallHeight / 2, 0);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            scene.add(leftWall);
            
            const rightWall = leftWall.clone();
            rightWall.position.x = arenaHalf + wallThickness / 2;
            scene.add(rightWall);
            
            // Front & Back
            const endGeo = new THREE.BoxGeometry(CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 4, wallHeight, wallThickness);
            const backWall = new THREE.Mesh(endGeo, wallMat);
            backWall.position.set(0, wallHeight / 2, -arenaHalf - wallThickness / 2);
            backWall.castShadow = true;
            backWall.receiveShadow = true;
            scene.add(backWall);
            
            const frontWall = backWall.clone();
            frontWall.position.z = arenaHalf + wallThickness / 2;
            scene.add(frontWall);
            
            // Background glowing eyes (creepy watchers)
            eyeMeshes = [];
            const eyeCountPerWall = 6;
            // Left wall eyes
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    -arenaHalf - 2,
                    3 + Math.random() * 4,
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1)))
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            // Right wall eyes
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    arenaHalf + 2,
                    3 + Math.random() * 4,
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1)))
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            // Back wall eyes
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1))),
                    3 + Math.random() * 4,
                    -arenaHalf - 2
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            
            console.log('%c3D HORROR SNAKE initialized - ready for terror', 'color:#ff0000; font-family:monospace');
        }

        // Initialize snake (modular - easy to change starting length or shape)
        function initSnake() {
            snakeMeshes.forEach(m => scene.remove(m));
            snakeMeshes = [];
            snakeGridPositions = [];
            
            const startX = Math.floor(CONFIG.GRID_SIZE / 2);
            const startZ = Math.floor(CONFIG.GRID_SIZE / 2);
            
            for (let i = 0; i < CONFIG.INITIAL_LENGTH; i++) {
                const gridPos = new THREE.Vector3(startX - i, 0, startZ);
                snakeGridPositions.push(gridPos);
                
                const isHead = (i === 0);
                const segment = createSegmentMesh(isHead);
                segment.position.copy(gridToWorld(gridPos));
                scene.add(segment);
                snakeMeshes.push(segment);
            }
            
            // Save initial previous grid for lerp system
            previousSnakeGrid = snakeGridPositions.map(pos => pos.clone());
            
            direction = new THREE.Vector3(1, 0, 0);
            pendingDirection = null;
        }

        // Spawn new food (horror "eye" that the snake eats)
        function spawnFood() {
            if (foodMesh) scene.remove(foodMesh);
            
            let pos;
            let attempts = 0;
            do {
                pos = new THREE.Vector3(
                    Math.floor(Math.random() * CONFIG.GRID_SIZE),
                    0,
                    Math.floor(Math.random() * CONFIG.GRID_SIZE)
                );
                attempts++;
            } while (
                attempts < 100 &&
                snakeGridPositions.some(s => s.x === pos.x && s.z === pos.z)
            );
            
            foodGrid = pos;
            
            // Spiky horror eye food
            foodMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(CONFIG.CELL_SIZE * 0.45, 1),
                new THREE.MeshStandardMaterial({
                    color: 0xff1122,
                    emissive: 0xff0000,
                    emissiveIntensity: 1.2,
                    roughness: 0.3
                })
            );
            foodMesh.position.copy(gridToWorld(foodGrid));
            foodMesh.castShadow = true;
            scene.add(foodMesh);
            
            // Slight rotation animation will be handled in animate loop
        }

        // Core move logic (collision + growth + horror trigger)
        function moveSnake() {
            if (gameOver) return;
            
            // Apply pending direction (prevents instant reversal)
            if (pendingDirection) {
                // Only allow if not opposite
                if (!pendingDirection.clone().multiplyScalar(-1).equals(direction)) {
                    direction.copy(pendingDirection);
                }
                pendingDirection = null;
            }
            
            // Save current grid as "from" for smooth lerp
            const oldGrid = snakeGridPositions.map(pos => pos.clone());
            
            // Calculate new head position
            const head = snakeGridPositions[0];
            const newHead = head.clone().add(direction);
            
            // === COLLISION DETECTION ===
            const outOfBounds = 
                newHead.x < 0 || newHead.x >= CONFIG.GRID_SIZE ||
                newHead.z < 0 || newHead.z >= CONFIG.GRID_SIZE;
            
            const selfCollision = snakeGridPositions.some(pos => 
                pos.x === newHead.x && pos.z === newHead.z
            );
            
            if (outOfBounds || selfCollision) {
                triggerGameOver();
                return;
            }
            
            // Add new head
            snakeGridPositions.unshift(newHead);
            
            // Check if ate food
            const ate = foodGrid && newHead.x === foodGrid.x && newHead.z === foodGrid.z;
            
            if (ate) {
                score++;
                document.getElementById('score').textContent = score;
                
                // HORROR JUMP-SCARE
                triggerJumpScare();
                
                spawnFood();
            } else {
                snakeGridPositions.pop();
            }
            
            // Sync mesh count (grow only when eating)
            while (snakeMeshes.length < snakeGridPositions.length) {
                const tailGrid = snakeGridPositions[snakeGridPositions.length - 1];
                const newSegment = createSegmentMesh(false); // body segment
                newSegment.position.copy(gridToWorld(tailGrid));
                scene.add(newSegment);
                snakeMeshes.push(newSegment);
            }
            
            // Update previous grid for lerp (handles growth correctly)
            previousSnakeGrid = oldGrid;
            if (snakeGridPositions.length > previousSnakeGrid.length) {
                previousSnakeGrid.push(previousSnakeGrid[previousSnakeGrid.length - 1].clone());
            }
        }

        // Jump-scare on eating food (flash + camera shake + red pulse)
        function triggerJumpScare() {
            // Screen flash
            const flashEl = document.getElementById('flash');
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '0.75';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 120ms ease-out';
                flashEl.style.opacity = '0';
            }, 10);
            
            // Camera shake
            shakeIntensity = 1.8;
            shakeDecay = 0.12;
            
            // Light pulse (extra terror)
            dirLight.intensity = 2.5;
            setTimeout(() => { if (!gameOver) dirLight.intensity = 0.45; }, 80);
            
            // Optional: distort head slightly
            if (snakeMeshes[0]) {
                snakeMeshes[0].scale.set(1.4, 1.4, 1.4);
                setTimeout(() => {
                    if (snakeMeshes[0]) snakeMeshes[0].scale.set(1, 1, 1);
                }, 120);
            }
            
            // TODO: Add real horror audio here (scream / heartbeat)
            // Example: new Audio('horror-scream.mp3').play();
        }

        // Game over sequence
        function triggerGameOver() {
            gameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            
            // Final horror effect: red fog + camera tilt
            scene.fog.color.setHex(0x330000);
            camera.position.y += 8;
            camera.lookAt(0, -5, 0);
            
            // Make snake body glow red briefly
            snakeMeshes.forEach((mesh, i) => {
                if (mesh.material) {
                    mesh.material.emissive = new THREE.Color(0xff0000);
                    mesh.material.emissiveIntensity = 2;
                }
            });
        }

        // Keyboard controls (arrow + WASD)
        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (gameOver) {
                    if (e.key.toLowerCase() === 'r') resetGame();
                    return;
                }
                
                let newDir = null;
                
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        newDir = new THREE.Vector3(-1, 0, 0);
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        newDir = new THREE.Vector3(1, 0, 0);
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        newDir = new THREE.Vector3(0, 0, -1);
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        newDir = new THREE.Vector3(0, 0, 1);
                        break;
                }
                
                if (newDir) pendingDirection = newDir;
            });
        }

        // Reset / restart game
        function resetGame() {
            gameOver = false;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            scene.fog.color.setHex(CONFIG.FOG_COLOR);
            
            initSnake();
            spawnFood();
            lastMoveTime = Date.now();
            
            // Reset camera
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
        }

        // Main animation loop (efficient, fixed timestep + smooth lerp)
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const currentTime = Date.now();
            
            // Fixed timestep movement
            if (!gameOver && currentTime - lastMoveTime > MOVE_INTERVAL) {
                moveSnake();
                lastMoveTime = currentTime;
            }
            
            // Smooth lerp for all segments (gives fluid snake movement)
            const progress = Math.min((currentTime - lastMoveTime) / MOVE_INTERVAL, 1);
            for (let i = 0; i < snakeMeshes.length; i++) {
                if (!previousSnakeGrid[i] || !snakeGridPositions[i]) continue;
                
                const from = gridToWorld(previousSnakeGrid[i]);
                const to = gridToWorld(snakeGridPositions[i]);
                
                const lerpedPos = from.clone().lerp(to, progress);
                snakeMeshes[i].position.copy(lerpedPos);
                
                // Head always faces movement direction
                if (i === 0 && snakeMeshes[0]) {
                    snakeMeshes[0].rotation.y = Math.atan2(direction.x, direction.z);
                }
            }
            
            // Animate food (pulsing horror eye)
            if (foodMesh) {
                foodMesh.rotation.y = time * 2.5;
                const pulse = 1 + Math.sin(time * 8) * 0.15;
                foodMesh.scale.setScalar(pulse);
            }
            
            // Eerie flickering light + eye pulse
            dirLight.intensity = 0.45 + Math.sin(time * 12) * 0.12;
            
            // Pulse background eyes
            eyeMeshes.forEach((eye, i) => {
                const scale = 1 + Math.sin(time * 6 + i) * 0.15;
                eye.scale.setScalar(scale);
            });
            
            // Camera shake on jump-scare
            if (shakeIntensity > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.6;
                camera.position.z += (Math.random() - 0.5) * shakeIntensity * 0.4;
                shakeIntensity *= (1 - shakeDecay);
                if (shakeIntensity < 0.05) shakeIntensity = 0;
            }
            
            renderer.render(scene, camera);
        }

        // Start the nightmare
        function startGame() {
            initScene();
            initSnake();
            spawnFood();
            setupControls();
            lastMoveTime = Date.now();
            animate();
            
            // Console message for modularity
            console.log('%c✅ Horror Snake ready. Expand by editing CONFIG or adding new effects in triggerJumpScare()', 'color:#00ff88; background:#110022; padding:2px 6px');
        }
        
        // Launch
        window.onload = startGame;
    </script>
</body>
</html>
