<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D HORROR SNAKE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            font-size: 28px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 80px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #800000;
            display: none;
            text-align: center;
            z-index: 200;
            pointer-events: none;
        }
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 300;
            transition: opacity 80ms ease-out;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #660000;
            font-size: 14px;
            text-shadow: 0 0 5px #ff0000;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span>
        <span style="font-size:22px; opacity:0.8;">|</span>
        HIGH SCORE: <span id="highScore">0</span>
    </div>
    <div id="gameOver">
        YOU DIED<br>
        <span style="font-size: 24px;">PRESS R TO RESTART</span>
    </div>
    <div id="flash"></div>
    <div id="instructions">
        ARROW KEYS or WASD • EAT THE EYES • SURVIVE THE FOREST
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // =============================================
        // 3D HORROR SNAKE - Realistic Forest Edition
        // • Cylindrical snake body with proper segment orientation
        // • Longer, more organic head
        // • Trees added (forest atmosphere)
        // • Walls completely removed (open forest, invisible boundaries only)
        // • Enhanced scoreboard with persistent high score
        // =============================================

        let scene, camera, renderer;
        let snakeMeshes = [];
        let snakeGridPositions = [];
        let previousSnakeGrid = [];
        let foodMesh = null;
        let foodGrid = null;
        let direction = new THREE.Vector3(1, 0, 0);
        let pendingDirection = null;
        let gameOver = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('horrorSnakeHighScore') || '0');
        let lastMoveTime = 0;
        let clock;
        let MOVE_INTERVAL = 160;

        // Horror elements
        let dirLight, ambientLight, hemiLight, redLight;
        let eyeMeshes = [];

        // Shake
        let shakeIntensity = 0;
        let shakeDecay = 0;

        const CONFIG = {
            SNAKE_COLOR: 0x0f4a0f,
            HEAD_COLOR: 0x22aa22,
            BODY_EMISSIVE: 0x002200,
            FLOOR_COLOR: 0x221133,
            FOG_COLOR: 0x223355,
            EYE_GLOW: 0x00ff88,
            GRID_SIZE: 22,
            CELL_SIZE: 2.2,
            MOVE_SPEED: 160,
            INITIAL_LENGTH: 6
        };

        // Helper: convert grid coords to world position
        function gridToWorld(gridPos) {
            return new THREE.Vector3(
                (gridPos.x - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE,
                0.5,
                (gridPos.z - CONFIG.GRID_SIZE / 2 + 0.5) * CONFIG.CELL_SIZE
            );
        }

        // Create a single snake segment - MORE REALISTIC
        function createSegmentMesh(isHead = false) {
            let mesh;
            
            if (isHead) {
                // Realistic head: longer box (elongated forward), darker green
                const geometry = new THREE.BoxGeometry(
                    CONFIG.CELL_SIZE * 0.88, 
                    CONFIG.CELL_SIZE * 0.92, 
                    CONFIG.CELL_SIZE * 1.35   // longer in forward axis
                );
                
                const material = new THREE.MeshStandardMaterial({
                    color: CONFIG.HEAD_COLOR,
                    emissive: CONFIG.BODY_EMISSIVE,
                    emissiveIntensity: 0.9,
                    roughness: 0.5,
                    metalness: 0.3
                });
                
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Red glowing eyes (slightly repositioned for longer head)
                const eyeGeo = new THREE.SphereGeometry(0.27, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(0.38, 0.38, 0.48);
                mesh.add(leftEye);
                
                const rightEye = leftEye.clone();
                rightEye.position.z = -0.48;
                mesh.add(rightEye);
            } else {
                // Realistic body: smooth cylinder (looks like real snake segments)
                const geometry = new THREE.CylinderGeometry(
                    CONFIG.CELL_SIZE * 0.38,  // top radius
                    CONFIG.CELL_SIZE * 0.42,  // bottom radius (slightly tapered)
                    CONFIG.CELL_SIZE * 0.92,  // length
                    16                        // smooth roundness
                );
                
                const material = new THREE.MeshStandardMaterial({
                    color: CONFIG.SNAKE_COLOR,
                    emissive: CONFIG.BODY_EMISSIVE,
                    emissiveIntensity: 0.45,
                    roughness: 0.45,
                    metalness: 0.1
                });
                
                mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Rotate cylinder to lie horizontally along +Z (will be rotated per segment later)
                mesh.rotation.x = Math.PI / 2;
            }
            
            return mesh;
        }

        // Create glowing background eye
        function createEye() {
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 6, 6),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    transparent: true,
                    opacity: 0.95
                })
            );
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.28, 0.35, 8),
                new THREE.MeshBasicMaterial({
                    color: CONFIG.EYE_GLOW,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.5
                })
            );
            ring.rotation.x = Math.PI / 2;
            eye.add(ring);
            return eye;
        }

        // Create realistic forest tree
        function createTree() {
            const group = new THREE.Group();
            
            // Trunk (dark bark for horror forest)
            const trunkGeometry = new THREE.CylinderGeometry(0.35, 0.55, 5.2, 6);
            const trunkMaterial = new THREE.MeshStandardMaterial({
                color: 0x3c2a1f,
                roughness: 1,
                metalness: 0.05
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 2.6;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            // Foliage - 3 layered cones (dark, ominous green)
            const foliageMaterial = new THREE.MeshStandardMaterial({
                color: 0x0d2e0d,
                roughness: 0.9,
                metalness: 0
            });
            
            const foliageData = [
                { radius: 2.9, height: 3.6, y: 5.1 },
                { radius: 2.2, height: 3.2, y: 7.4 },
                { radius: 1.4, height: 2.8, y: 9.3 }
            ];
            
            foliageData.forEach(data => {
                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(data.radius, data.height, 8),
                    foliageMaterial
                );
                cone.position.y = data.y;
                cone.castShadow = true;
                group.add(cone);
            });
            
            return group;
        }

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(CONFIG.FOG_COLOR, 18, 110);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();
            
            // === LIGHTING (kept bright & clear for visibility while horror) ===
            ambientLight = new THREE.AmbientLight(0x335577, 0.65);
            scene.add(ambientLight);
            
            hemiLight = new THREE.HemisphereLight(0x445577, CONFIG.FLOOR_COLOR, 0.55);
            scene.add(hemiLight);
            
            dirLight = new THREE.DirectionalLight(0xffeecc, 1.25);
            dirLight.position.set(25, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -40;
            dirLight.shadow.camera.right = 40;
            dirLight.shadow.camera.top = 40;
            dirLight.shadow.camera.bottom = -40;
            scene.add(dirLight);
            
            redLight = new THREE.PointLight(0xff2233, 0.85, 80);
            redLight.position.set(15, 12, -15);
            scene.add(redLight);
            
            // Large forest floor
            const floorGeo = new THREE.PlaneGeometry(
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 68,
                CONFIG.GRID_SIZE * CONFIG.CELL_SIZE + 68
            );
            const floorMat = new THREE.MeshStandardMaterial({
                color: CONFIG.FLOOR_COLOR,
                roughness: 0.9,
                metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Arena size reference (used for eyes only - walls removed)
            const arenaHalf = (CONFIG.GRID_SIZE * CONFIG.CELL_SIZE) / 2;
            
            // Background glowing eyes (now floating in the dark forest - extra creepy)
            eyeMeshes = [];
            const eyeCountPerWall = 6;
            // Left side
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    -arenaHalf - 2,
                    3 + Math.random() * 4,
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1)))
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            // Right side
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    arenaHalf + 2,
                    3 + Math.random() * 4,
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1)))
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            // Back side
            for (let i = 0; i < eyeCountPerWall; i++) {
                const eye = createEye();
                eye.position.set(
                    -arenaHalf + 4 + (i * (arenaHalf * 2 / (eyeCountPerWall - 1))),
                    3 + Math.random() * 4,
                    -arenaHalf - 2
                );
                scene.add(eye);
                eyeMeshes.push(eye);
            }
            
            // === ADD FOREST TREES ===
            const numTrees = 28;
            const treeSpread = CONFIG.GRID_SIZE * CONFIG.CELL_SIZE * 1.9;
            for (let i = 0; i < numTrees; i++) {
                const tree = createTree();
                const x = (Math.random() - 0.5) * treeSpread;
                const z = (Math.random() - 0.5) * treeSpread;
                tree.position.set(x, 0, z);
                tree.rotation.y = Math.random() * Math.PI * 2;
                scene.add(tree);
            }
            
            console.log('%c3D HORROR SNAKE - Realistic Forest Edition Ready', 'color:#00ff88; font-family:monospace');
        }

        // Initialize snake
        function initSnake() {
            snakeMeshes.forEach(m => scene.remove(m));
            snakeMeshes = [];
            snakeGridPositions = [];
            
            const startX = Math.floor(CONFIG.GRID_SIZE / 2);
            const startZ = Math.floor(CONFIG.GRID_SIZE / 2);
            
            for (let i = 0; i < CONFIG.INITIAL_LENGTH; i++) {
                const gridPos = new THREE.Vector3(startX - i, 0, startZ);
                snakeGridPositions.push(gridPos);
                
                const isHead = (i === 0);
                const segment = createSegmentMesh(isHead);
                segment.position.copy(gridToWorld(gridPos));
                scene.add(segment);
                snakeMeshes.push(segment);
            }
            
            previousSnakeGrid = snakeGridPositions.map(pos => pos.clone());
            direction = new THREE.Vector3(1, 0, 0);
            pendingDirection = null;
        }

        // Spawn food
        function spawnFood() {
            if (foodMesh) scene.remove(foodMesh);
            
            let pos;
            let attempts = 0;
            do {
                pos = new THREE.Vector3(
                    Math.floor(Math.random() * CONFIG.GRID_SIZE),
                    0,
                    Math.floor(Math.random() * CONFIG.GRID_SIZE)
                );
                attempts++;
            } while (
                attempts < 100 &&
                snakeGridPositions.some(s => s.x === pos.x && s.z === pos.z)
            );
            
            foodGrid = pos;
            
            foodMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(CONFIG.CELL_SIZE * 0.45, 1),
                new THREE.MeshStandardMaterial({
                    color: 0xff1122,
                    emissive: 0xff0000,
                    emissiveIntensity: 1.5,
                    roughness: 0.2
                })
            );
            foodMesh.position.copy(gridToWorld(foodGrid));
            foodMesh.castShadow = true;
            scene.add(foodMesh);
        }

        // Core move logic (walls removed - only invisible grid bounds remain)
        function moveSnake() {
            if (gameOver) return;
            
            if (pendingDirection) {
                if (!pendingDirection.clone().multiplyScalar(-1).equals(direction)) {
                    direction.copy(pendingDirection);
                }
                pendingDirection = null;
            }
            
            const oldGrid = snakeGridPositions.map(pos => pos.clone());
            
            const head = snakeGridPositions[0];
            const newHead = head.clone().add(direction);
            
            const outOfBounds = 
                newHead.x < 0 || newHead.x >= CONFIG.GRID_SIZE ||
                newHead.z < 0 || newHead.z >= CONFIG.GRID_SIZE;
            
            const selfCollision = snakeGridPositions.some(pos => 
                pos.x === newHead.x && pos.z === newHead.z
            );
            
            if (outOfBounds || selfCollision) {
                triggerGameOver();
                return;
            }
            
            snakeGridPositions.unshift(newHead);
            
            const ate = foodGrid && newHead.x === foodGrid.x && newHead.z === foodGrid.z;
            
            if (ate) {
                score++;
                document.getElementById('score').textContent = score;
                triggerJumpScare();
                spawnFood();
            } else {
                snakeGridPositions.pop();
            }
            
            while (snakeMeshes.length < snakeGridPositions.length) {
                const tailGrid = snakeGridPositions[snakeGridPositions.length - 1];
                const newSegment = createSegmentMesh(false);
                newSegment.position.copy(gridToWorld(tailGrid));
                scene.add(newSegment);
                snakeMeshes.push(newSegment);
            }
            
            previousSnakeGrid = oldGrid;
            if (snakeGridPositions.length > previousSnakeGrid.length) {
                previousSnakeGrid.push(previousSnakeGrid[previousSnakeGrid.length - 1].clone());
            }
        }

        // Jump-scare
        function triggerJumpScare() {
            const flashEl = document.getElementById('flash');
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '0.75';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 120ms ease-out';
                flashEl.style.opacity = '0';
            }, 10);
            
            shakeIntensity = 1.8;
            shakeDecay = 0.12;
            
            dirLight.intensity = 2.8;
            setTimeout(() => { if (!gameOver) dirLight.intensity = 1.25; }, 80);
            
            if (snakeMeshes[0]) {
                snakeMeshes[0].scale.set(1.4, 1.4, 1.4);
                setTimeout(() => {
                    if (snakeMeshes[0]) snakeMeshes[0].scale.set(1, 1, 1);
                }, 120);
            }
        }

        // Game over
        function triggerGameOver() {
            gameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            
            scene.fog.color.setHex(0x330000);
            camera.position.y += 8;
            camera.lookAt(0, -5, 0);
            
            snakeMeshes.forEach((mesh) => {
                if (mesh.material) {
                    mesh.material.emissive = new THREE.Color(0xff0000);
                    mesh.material.emissiveIntensity = 2.5;
                }
            });
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('horrorSnakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        // Keyboard controls
        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (gameOver) {
                    if (e.key.toLowerCase() === 'r') resetGame();
                    return;
                }
                
                let newDir = null;
                
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        newDir = new THREE.Vector3(-1, 0, 0);
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        newDir = new THREE.Vector3(1, 0, 0);
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        newDir = new THREE.Vector3(0, 0, -1);
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        newDir = new THREE.Vector3(0, 0, 1);
                        break;
                }
                
                if (newDir) pendingDirection = newDir;
            });
        }

        // Reset game
        function resetGame() {
            gameOver = false;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            scene.fog.color.setHex(CONFIG.FOG_COLOR);
            
            initSnake();
            spawnFood();
            lastMoveTime = Date.now();
            
            camera.position.set(0, 38, 45);
            camera.lookAt(0, 0, 0);
        }

        // Main animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const currentTime = Date.now();
            
            if (!gameOver && currentTime - lastMoveTime > MOVE_INTERVAL) {
                moveSnake();
                lastMoveTime = currentTime;
            }
            
            const progress = Math.min((currentTime - lastMoveTime) / MOVE_INTERVAL, 1);
            
            // Update snake with realistic body orientation
            for (let i = 0; i < snakeMeshes.length; i++) {
                if (!previousSnakeGrid[i] || !snakeGridPositions[i]) continue;
                
                const from = gridToWorld(previousSnakeGrid[i]);
                const to = gridToWorld(snakeGridPositions[i]);
                
                const lerpedPos = from.clone().lerp(to, progress);
                snakeMeshes[i].position.copy(lerpedPos);
                
                // Head faces movement direction
                if (i === 0 && snakeMeshes[0]) {
                    snakeMeshes[0].rotation.y = Math.atan2(direction.x, direction.z);
                } 
                // Body segments face toward the segment in front of them (realistic snake curve)
                else if (i > 0 && snakeGridPositions[i-1] && snakeGridPositions[i]) {
                    const dir = snakeGridPositions[i-1].clone().sub(snakeGridPositions[i]).normalize();
                    const angle = Math.atan2(dir.x, dir.z);
                    snakeMeshes[i].rotation.y = angle;
                }
            }
            
            if (foodMesh) {
                foodMesh.rotation.y = time * 2.5;
                const pulse = 1 + Math.sin(time * 8) * 0.15;
                foodMesh.scale.setScalar(pulse);
            }
            
            // Brighter flickering directional light
            dirLight.intensity = 1.25 + Math.sin(time * 12) * 0.22;
            
            // Pulse background eyes
            eyeMeshes.forEach((eye, i) => {
                const scale = 1 + Math.sin(time * 6 + i) * 0.15;
                eye.scale.setScalar(scale);
            });
            
            // Camera shake
            if (shakeIntensity > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.6;
                camera.position.z += (Math.random() - 0.5) * shakeIntensity * 0.4;
                shakeIntensity *= (1 - shakeDecay);
                if (shakeIntensity < 0.05) shakeIntensity = 0;
            }
            
            renderer.render(scene, camera);
        }

        // Start the game
        function startGame() {
            initScene();
            initSnake();
            spawnFood();
            setupControls();
            lastMoveTime = Date.now();
            
            // Set initial high score display
            document.getElementById('highScore').textContent = highScore;
            
            animate();
            
            console.log('%c✅ 3D HORROR SNAKE - Realistic Forest Edition Active (No walls, trees added, realistic snake)', 'color:#00ff88; background:#110022; padding:2px 6px');
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
