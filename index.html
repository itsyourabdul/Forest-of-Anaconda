<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D HORROR SNAKE - SMOOTH</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:monospace; }
canvas { display:block; }

#ui {
    position:absolute;
    top:20px; left:20px;
    color:#ff0000;
    text-shadow:0 0 12px #ff0000;
    font-size:26px;
    display:flex; gap:12px;
}
#score { transition:transform 0.15s ease; }

#snakeSelect {
    position:absolute;
    width:100%; height:100%;
    background:#0a0014;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#ff0000;
}

.snake-option {
    cursor:pointer;
    padding:20px;
    margin:10px;
    border:3px solid #ff0000;
}
.snake-option.selected {
    background:#220000;
}

#startBtn {
    margin-top:30px;
    padding:12px 26px;
    background:#ff0000;
    border:none;
    cursor:pointer;
}

#gameOver {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#ff0000;
    font-size:60px;
    display:none;
}
</style>
</head>

<body>

<div id="snakeSelect">
    <h1>CHOOSE YOUR SERPENT</h1>
    <div>
        <div class="snake-option" onclick="chooseSnake(0)">VENOM</div>
        <div class="snake-option" onclick="chooseSnake(1)">CRIMSON</div>
        <div class="snake-option" onclick="chooseSnake(2)">PHANTOM</div>
    </div>
    <button id="startBtn">START GAME</button>
</div>

<div id="ui">
    SCORE: <span id="score">0</span>
</div>

<div id="gameOver">
    YOU DIED<br>Press R
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
let scene, camera, renderer, clock;

let snakeMeshes=[], snakeGrid=[], prevGrid=[];
let foodMesh, foodGrid;

let direction=new THREE.Vector3(1,0,0);
let directionQueue=[];

let selectedSnake=0;
let chosen=false;

let score=0;
let MOVE_INTERVAL=200;
let accumulator=0;

const GRID=20;
const CELL=2;

const TYPES=[
 {head:0x22aa22, body:0x0f4a0f},
 {head:0xcc2222, body:0x661111},
 {head:0x4444aa, body:0x222233}
];

function gridToWorld(p){
    return new THREE.Vector3(
        (p.x-GRID/2)*CELL,
        0.5,
        (p.z-GRID/2)*CELL
    );
}

function createSegment(head=false){
    let geo=head?
        new THREE.BoxGeometry(1.6,1.6,2):
        new THREE.CylinderGeometry(0.6,0.6,1.5,16);

    let mat=new THREE.MeshStandardMaterial({
        color: head?TYPES[selectedSnake].head:TYPES[selectedSnake].body
    });

    let m=new THREE.Mesh(geo,mat);
    if(!head) m.rotation.x=Math.PI/2;
    return m;
}

function init(){
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth,innerHeight);
    renderer.shadowMap.enabled=true;
    renderer.shadowMap.type=THREE.BasicShadowMap;
    document.body.appendChild(renderer.domElement);

    clock=new THREE.Clock();

    let light=new THREE.DirectionalLight(0xffffff,1);
    light.position.set(20,30,10);
    scene.add(light);

    let floor=new THREE.Mesh(
        new THREE.PlaneGeometry(200,200),
        new THREE.MeshStandardMaterial({color:0x111122})
    );
    floor.rotation.x=-Math.PI/2;
    scene.add(floor);
}

function initSnake(){
    snakeMeshes.forEach(m=>scene.remove(m));
    snakeMeshes=[];
    snakeGrid=[];

    for(let i=0;i<6;i++){
        let p=new THREE.Vector3(10-i,0,10);
        snakeGrid.push(p);

        let m=createSegment(i==0);
        m.position.copy(gridToWorld(p));
        scene.add(m);
        snakeMeshes.push(m);
    }
    prevGrid=snakeGrid.map(p=>p.clone());
}

function spawnFood(){
    foodGrid=new THREE.Vector3(
        Math.floor(Math.random()*GRID),
        0,
        Math.floor(Math.random()*GRID)
    );

    if(foodMesh) scene.remove(foodMesh);

    foodMesh=new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.8),
        new THREE.MeshStandardMaterial({color:0xff0000})
    );

    foodMesh.position.copy(gridToWorld(foodGrid));
    scene.add(foodMesh);
}

function move(){
    if(directionQueue.length){
        let next=directionQueue.shift();
        if(!next.clone().multiplyScalar(-1).equals(direction)){
            direction.copy(next);
        }
    }

    let newHead=snakeGrid[0].clone().add(direction);

    if(newHead.x<0||newHead.x>=GRID||newHead.z<0||newHead.z>=GRID){
        gameOver();
        return;
    }

    snakeGrid.unshift(newHead);

    let ate=newHead.x===foodGrid.x && newHead.z===foodGrid.z;

    if(ate){
        score++;
        document.getElementById('score').textContent=score;
        let s=document.getElementById('score');
        s.style.transform='scale(1.4)';
        setTimeout(()=>s.style.transform='scale(1)',120);

        spawnFood();
        MOVE_INTERVAL=Math.max(90,200-score*3);
    } else {
        snakeGrid.pop();
    }

    while(snakeMeshes.length<snakeGrid.length){
        let m=createSegment(false);
        scene.add(m);
        snakeMeshes.push(m);
    }

    prevGrid=snakeGrid.map(p=>p.clone());
}

function animate(){
    requestAnimationFrame(animate);

    let delta=clock.getDelta()*1000;
    accumulator+=delta;

    while(accumulator>=MOVE_INTERVAL){
        move();
        accumulator-=MOVE_INTERVAL;
    }

    let progress=accumulator/MOVE_INTERVAL;

    for(let i=0;i<snakeMeshes.length;i++){
        let from=gridToWorld(prevGrid[i]||snakeGrid[i]);
        let to=gridToWorld(snakeGrid[i]);

        snakeMeshes[i].position.copy(from.lerp(to,progress));

        if(i===0){
            let head=snakeMeshes[0].position;
            camera.position.lerp(new THREE.Vector3(head.x,15,head.z+20),0.08);
            camera.lookAt(head);
        }
    }

    renderer.render(scene,camera);
}

function gameOver(){
    document.getElementById('gameOver').style.display='block';
}

document.addEventListener('keydown',e=>{
    let d=null;
    if(e.key==='ArrowLeft'||e.key==='a') d=new THREE.Vector3(-1,0,0);
    if(e.key==='ArrowRight'||e.key==='d') d=new THREE.Vector3(1,0,0);
    if(e.key==='ArrowUp'||e.key==='w') d=new THREE.Vector3(0,0,-1);
    if(e.key==='ArrowDown'||e.key==='s') d=new THREE.Vector3(0,0,1);

    if(d){
        directionQueue.push(d);
        if(directionQueue.length>2) directionQueue.shift();
    }

    if(e.key==='r') location.reload();
});

window.chooseSnake=function(t){
    selectedSnake=t;
    document.querySelectorAll('.snake-option').forEach(el=>el.classList.remove('selected'));
    document.querySelectorAll('.snake-option')[t].classList.add('selected');
    chosen=true;
};

document.getElementById('startBtn').onclick=()=>{
    if(!chosen) return alert("Pick a snake!");
    document.getElementById('snakeSelect').style.display='none';

    init();
    initSnake();
    spawnFood();
    animate();
};
</script>

</body>
</html>
